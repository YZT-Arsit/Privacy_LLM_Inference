    requires_mpc_fhe: false
    tee_holds_full_model: true
    runs_real_7b: null
    real_attestation: true
    reported_latency: null
    source_type: cited
    notes: "Entire model runs inside a CPU enclave; no GPU acceleration of the protected compute. 7B interactive throughput on CPU TEE typically impractical; latency not cited."

