# Prior-work privacy-preserving LLM inference methods (category-level).
#
# This is the SOTA comparison table data source. It is read by
# scripts/render_sota_comparison_tables.py.
#
# HONESTY RULES (enforced by reviewers):
#   * Each entry has EXACTLY the fields listed below -- no more, no less.
#   * DO NOT invent numbers. Any numeric/boolean value you cannot cite or are
#     not confident about MUST be `null` (YAML null). `null` means
#     "not-claimed / unknown", NOT "false".
#   * `reported_latency` is null unless a specific, citable figure exists. We do
#     not put our own measured latency here (it is measured/reported elsewhere).
#   * `source_type` is one of: cited | reproduced | estimated | ours.
#   * Rows are CATEGORY-level representatives of real method families we are
#     confident exist; `notes` carries the honest caveat.
#
# Fields (exact set, in order):
#   method, paper, year, protects_input, protects_logits, protects_kv,
#   protects_lora, requires_gpu_tee, requires_mpc_fhe, tee_holds_full_model,
#   runs_real_7b, real_attestation, reported_latency, source_type, notes

methods:
  - method: "MPC-based secure inference (e.g. CrypTen-style 2PC/3PC)"
    paper: "Knott et al., CrypTen (NeurIPS 2021) and follow-ups"
    year: 2021
    protects_input: true
    protects_logits: true
    protects_kv: null
    protects_lora: null
    requires_gpu_tee: false
    requires_mpc_fhe: true
    tee_holds_full_model: false
    runs_real_7b: null
    real_attestation: false
    reported_latency: null
    source_type: cited
    notes: "Cryptographic 2PC/3PC; strong privacy but large compute/comm overhead. 7B-scale interactive latency not claimed here; KV/LoRA handling not standard."

  - method: "FHE-based private inference (e.g. CKKS transformer eval)"
    paper: "Various (e.g. THE-X / homomorphic transformer evaluations)"
    year: 2022
    protects_input: true
