    protects_kv: null
    protects_lora: null
    requires_gpu_tee: false
    requires_mpc_fhe: true
    tee_holds_full_model: false
    runs_real_7b: null
    real_attestation: false
    reported_latency: null
    source_type: cited
    notes: "Fully homomorphic; data stays encrypted. Practicality at 7B autoregressive decode not established; nonlinearities approximated. Latency not cited."

  - method: "GPU-TEE full-model (NVIDIA H100 Confidential Computing)"
    paper: "NVIDIA Hopper Confidential Computing whitepaper"
    year: 2023
    protects_input: true
    protects_logits: true
    protects_kv: true
    protects_lora: true
    requires_gpu_tee: true
    requires_mpc_fhe: false
    tee_holds_full_model: true
    runs_real_7b: true
    real_attestation: true
    reported_latency: null
    source_type: cited
    notes: "Whole model + KV held inside a confidential GPU enclave. Requires CC-capable GPU (H100); trust rests on the GPU TEE. Latency depends on deployment; not cited here."

  - method: "CPU-TEE shielding of full model (SGX/SEV enclave)"
    paper: "TEE-shielded inference line (e.g. SGX/SEV-based serving)"
    year: 2020
    protects_input: true
    protects_logits: true
    protects_kv: true
    protects_lora: true
